name: Android CI (Build APK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # Use modern Gradle action for caching/config
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # ✅ IMPORTANT: Call 'gradle' (not './gradlew')
      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DayCard2-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # Optional: release build without wrapper, ready for signing later
  build-release:
    runs-on: ubuntu-latest
    needs: build-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble Release
        run: gradle :app:assembleRelease
        # (Signing can be added later via secrets + Gradle signing config)

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DayCard2-release-apk
          path: app/build/outputs/apk/release/*.apk
